# ─────────────────────────────────────────────────────────────────────────────
# Hailuo2.video · Dokploy Docker Compose
#
# 用法：
#   在 Dokploy 面板中选 "Docker Compose" 方式部署，
#   粘贴本文件内容，并在 Environment Variables 里填写下面标注的变量。
#
# 内部通信：
#   app → postgres 通过 service name "postgres" 直连，不走外网。
#
# 域名：
#   在 Dokploy 的 Domains 面板绑定 hailuo2.video，Traefik 自动申请 SSL。
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # 生产不对外暴露 PG，app 走 docker 内网 postgres:5432 直连。
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hailuo2video}
      POSTGRES_USER: ${POSTGRES_USER:-hailuo2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # ← 必填，在 Dokploy env 里设置
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Schema bootstrap: 首次启动时 postgres 自动跑 database/init.sql 建表。
      # 数据卷已有数据时不会重跑(只首次执行) — 已建表后此 mount 无副作用。
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hailuo2} -d ${POSTGRES_DB:-hailuo2video}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Next.js App ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0

      # ── 数据库（内部连接，走 docker 网络）──────────────────────────────────
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://${POSTGRES_USER:-hailuo2}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hailuo2video}
      DB_SINGLETON_ENABLED: "true"
      DB_MAX_CONNECTIONS: "1"

      # ── 应用 ───────────────────────────────────────────────────────────────
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://hailuo2.video}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Hailuo AI Video Generator}
      NEXT_PUBLIC_APP_DESCRIPTION: ${NEXT_PUBLIC_APP_DESCRIPTION:-Hailuo AI video generator for image-to-video. Animate any image into cinematic short videos powered by Hailuo AI.}
      NEXT_PUBLIC_APP_LOGO: /logo.png
      NEXT_PUBLIC_THEME: default
      NEXT_PUBLIC_APPEARANCE: dark

      # ── 认证 ───────────────────────────────────────────────────────────────
      AUTH_SECRET: ${AUTH_SECRET}               # ← 必填：openssl rand -base64 32
      AUTH_URL: ${NEXT_PUBLIC_APP_URL:-https://hailuo2.video}

      # ── AI providers（必填，否则 video 生成跑不起来）────────────────────
      # OpenRouter 是当前默认的 LLM provider
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Replicate（如果用 replicate 跑 hailuo 模型）
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}

      # ── 邮件（可选）───────────────────────────────────────────────────────
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_SENDER_EMAIL: ${RESEND_SENDER_EMAIL:-noreply@hailuo2.video}

      # ── Stripe（可选）─────────────────────────────────────────────────────
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}

      # ── PayPal（可选）─────────────────────────────────────────────────────
      NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${NEXT_PUBLIC_PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
    networks:
      - internal
      - dokploy-network   # Traefik 通过这个网络路由流量
    labels:
      # Traefik 路由（参数化：prod 与 pre 共用同一文件，靠环境变量区分）
      #   prod（默认值）：router=hailuo2video, 域名 hailuo2.video/www
      #   pre（在 Dokploy env 覆盖）：TRAEFIK_ROUTER=hailuo2video-pre,
      #        APP_RULE=Host(`pre.hailuo2.video`), ROUTER_MIDDLEWARES=hailuo2video-noindex
      - "traefik.enable=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER:-hailuo2video}.rule=${APP_RULE:-Host(`hailuo2.video`) || Host(`www.hailuo2.video`)}"
      - "traefik.http.routers.${TRAEFIK_ROUTER:-hailuo2video}.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER:-hailuo2video}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${TRAEFIK_ROUTER:-hailuo2video}.loadbalancer.server.port=3000"
      - "traefik.http.routers.${TRAEFIK_ROUTER:-hailuo2video}.middlewares=${ROUTER_MIDDLEWARES:-hailuo2video-www}"
      # www → apex 重定向（prod 默认启用）
      - "traefik.http.middlewares.hailuo2video-www.redirectregex.regex=^https://www\\.hailuo2\\.video/(.*)"
      - "traefik.http.middlewares.hailuo2video-www.redirectregex.replacement=https://hailuo2.video/$${1}"
      - "traefik.http.middlewares.hailuo2video-www.redirectregex.permanent=true"
      # noindex（pre 预览环境用，防止搜索引擎收录测试站）
      - "traefik.http.middlewares.hailuo2video-noindex.headers.customresponseheaders.X-Robots-Tag=noindex, nofollow"

volumes:
  postgres_data:
    driver: local

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true   # Dokploy 已经创建了这个网络